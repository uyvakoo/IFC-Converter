name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.14.4
      - name: ruff check (lint)
        run: ruff check .
      - name: ruff format (style)
        run: ruff format --check .

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit==2.10.1
      - name: Audit pinned runtime dependencies
        run: pip-audit --strict -r requirements.txt

  test:
    name: Test & coverage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Verify dependency consistency
        run: pip check

      - name: Install coverage
        run: pip install coverage==7.14.3

      - name: Fetch native binaries (IfcConvert, gltfpack)
        run: python scripts/fetch_binaries.py

      - name: Tests + core coverage (>= 80%)
        env:
          QT_QPA_PLATFORM: offscreen
        shell: pwsh
        run: |
          python -m coverage erase
          $suites = Get-ChildItem tests/validate_*.py -ErrorAction SilentlyContinue
          if (-not $suites) { Write-Host "no validation suites present yet"; exit 0 }
          foreach ($s in $suites) {
            Write-Host "=== $($s.Name) ==="
            python -m coverage run -a --source=core $s.FullName
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          python -m coverage report --fail-under=80

  package:
    name: Build bundle (smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect packaging spec
        id: spec
        shell: pwsh
        run: |
          if (Test-Path main.spec) {
            "present=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "present=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "no main.spec yet; skipping bundle build"
          }

      - name: Install hash-locked dependencies
        if: steps.spec.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Fetch native binaries (IfcConvert, gltfpack)
        if: steps.spec.outputs.present == 'true'
        run: python scripts/fetch_binaries.py

      - name: Build one-folder bundle (PyInstaller)
        if: steps.spec.outputs.present == 'true'
        run: pyinstaller main.spec --noconfirm

      - name: Bundle self-test (loads native libs + binaries from _MEIPASS)
        if: steps.spec.outputs.present == 'true'
        env:
          QT_QPA_PLATFORM: offscreen
        run: dist/IFC_Converter/IFC_Converter.exe --selftest
